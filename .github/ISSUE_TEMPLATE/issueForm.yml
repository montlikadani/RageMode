name: Bug Report
description: Create a bug report to help us improve our project
labels: 'Type: Unconfirmed'
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the below templates, creating an empty or non-filled issues will be closed immediately.
  - type: dropdown
    attributes:
      label: Type of bug
      multiple: false
      options:
        - Performance loss or memory leak
        - Compatibility issue
        - Error in console
        - Other
    validations:
      required: true
  - type: input
    attributes:
      label: RageMode version
      description: Run `/version ragemode` in the console, then copy and paste the full output into here.
    validations:
      required: true
  - type: input
    attributes:
      label: Software version
      description: Run `/version` in the console, then copy and paste the full output into here.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Relevant plugins
      description: If there is some conflicting or relevant plugins with ragemode you can insert here the name of the plugin(s). But it is enough if you run `/plugins` command and inserts here the output.
  - type: textarea
    attributes:
      label: Console error (if applicable)
      description: Upload the console error to https://paste.gg/ or any other paste server and insert the link into this box.
  - type: textarea
    attributes:
      label: RageMode configuration files
      description: Upload your RageMode config.yml file (and any other relevant files) to https://paste.gg/ or any other paste server and insert the link into this area.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Bug description
      description: |
        Explain your bug clearly and if possible include how to reproduce.
        You can also attach any related screenshots, files, links and timings/spark profiler reports.
    validations:
      required: true